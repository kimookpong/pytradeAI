<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Backtesting - pytradeAI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #1e1e1e; color: #d4d4d4; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #4ec9b0; margin-bottom: 20px; }
        
        .control-panel { background: #252526; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .control-group { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; margin-bottom: 15px; align-items: end; }
        label { display: block; color: #a0a0a0; font-size: 12px; margin-bottom: 4px; }
        input, select { background: #3e3e42; color: #d4d4d4; border: 1px solid #555; padding: 8px; border-radius: 4px; }
        input:focus, select:focus { border-color: #4ec9b0; outline: none; }
        button { padding: 10px 20px; background: #0e639c; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #1177bb; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .results { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .result-card { background: #252526; padding: 20px; border-radius: 8px; border-left: 3px solid #4ec9b0; }
        .result-card h3 { margin-top: 0; color: #4ec9b0; }
        .metric { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #3e3e42; }
        .metric-value { font-weight: bold; color: #4ec9b0; }
        .metric-value.negative { color: #f48771; }
        .metric-value.neutral { color: #dcdcaa; }
        
        .comparison-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .comparison-table th { background: #3e3e42; padding: 10px; text-align: left; font-weight: bold; color: #4ec9b0; }
        .comparison-table td { padding: 10px; border-bottom: 1px solid #3e3e42; }
        .comparison-table tr:hover { background: #2d2d31; }
        .comparison-table .rank1 { color: #4ec9b0; font-weight: bold; }
        .comparison-table .rankN { color: #f48771; }
        
        .loading { text-align: center; color: #4ec9b0; padding: 20px; }
        .error { background: #3a1a1a; color: #f48771; padding: 15px; border-radius: 4px; margin-top: 10px; }
        .success { background: #1a3a1a; color: #4ec9b0; padding: 15px; border-radius: 4px; margin-top: 10px; }
        
        .equity-chart { margin-top: 20px; }
        canvas { border: 1px solid #3e3e42; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧪 Backtesting Engine</h1>
    
    <div class="control-panel">
        <h3>Single Symbol Backtest</h3>
        <div class="control-group">
            <div>
                <label>Symbol</label>
                <select id="symbol">
                    <option>BTCUSD</option>
                    <option>XAUUSD</option>
                    <option>EURUSD</option>
                    <option>GBPUSD</option>
                    <option>USDJPY</option>
                    <option>ETHUSD</option>
                </select>
            </div>
            <div>
                <label>Days</label>
                <input type="number" id="days" value="30" min="1" max="365">
            </div>
            <div>
                <label>Start Balance ($)</label>
                <input type="number" id="start-balance" value="10000" min="100">
            </div>
            <button onclick="runBacktest()">🚀 Run Backtest</button>
        </div>
    </div>
    
    <div id="backtest-results"></div>
    
    <hr style="border: none; border-top: 1px solid #3e3e42; margin: 30px 0;">
    
    <div class="control-panel">
        <h3>Compare Multiple Symbols</h3>
        <div class="control-group">
            <div style="grid-column: 1 / -1;">
                <label>Symbols (comma-separated)</label>
                <input type="text" id="symbols-list" value="BTCUSD,XAUUSD,EURUSD" style="grid-column: 1 / -1;">
            </div>
        </div>
        <div class="control-group">
            <div>
                <label>Days</label>
                <input type="number" id="compare-days" value="30" min="1" max="365">
            </div>
            <button onclick="compareSymbols()">📊 Compare</button>
        </div>
    </div>
    
    <div id="comparison-results"></div>
</div>

<script>
const API_BASE = "http://localhost:8888/api";

async function runBacktest() {
    const symbol = document.getElementById("symbol").value;
    const days = parseInt(document.getElementById("days").value);
    const startBalance = parseFloat(document.getElementById("start-balance").value);
    
    const resultsEl = document.getElementById("backtest-results");
    resultsEl.innerHTML = '<div class="loading">⏳ Running backtest...</div>';
    
    try {
        const res = await fetch(`${API_BASE}/backtest/run?symbol=${symbol}&days=${days}`);
        const data = await res.json();
        
        if (data.error) {
            resultsEl.innerHTML = `<div class="error">❌ Error: ${data.error}</div>`;
            return;
        }
        
        // Format results
        const roi = data.roi_percent.toFixed(2);
        const dd = data.max_drawdown_percent.toFixed(2);
        const wr = data.win_rate.toFixed(1);
        const pf = data.profit_factor.toFixed(2);
        
        let html = `
<div class="results">
    <div class="result-card">
        <h3>📊 Backtest Results: ${symbol}</h3>
        <div class="metric">
            <span>Period:</span>
            <span>${days} days</span>
        </div>
        <div class="metric">
            <span>Total Trades:</span>
            <span>${data.total_trades}</span>
        </div>
        <div class="metric">
            <span>Wins / Losses:</span>
            <span>${data.wins} / ${data.losses}</span>
        </div>
        <div class="metric">
            <span>Win Rate:</span>
            <span class="metric-value">${wr}%</span>
        </div>
        <div class="metric">
            <span>Starting Balance:</span>
            <span>$${startBalance.toFixed(2)}</span>
        </div>
        <div class="metric">
            <span>Ending Balance:</span>
            <span class="metric-value ${data.net_profit >= 0 ? '' : 'negative'}">$${data.end_balance.toFixed(2)}</span>
        </div>
    </div>
    
    <div class="result-card">
        <h3>💰 Performance Metrics</h3>
        <div class="metric">
            <span>Net Profit:</span>
            <span class="metric-value ${data.net_profit >= 0 ? '' : 'negative'}">$${data.net_profit.toFixed(2)}</span>
        </div>
        <div class="metric">
            <span>ROI:</span>
            <span class="metric-value ${roi >= 0 ? '' : 'negative'}">${roi}%</span>
        </div>
        <div class="metric">
            <span>Profit Factor:</span>
            <span class="metric-value">${pf}</span>
        </div>
        <div class="metric">
            <span>Max Drawdown:</span>
            <span class="metric-value negative">${dd}% / $${data.max_drawdown.toFixed(2)}</span>
        </div>
        <div class="metric">
            <span>Avg Win:</span>
            <span class="metric-value">$${data.avg_win.toFixed(2)}</span>
        </div>
        <div class="metric">
            <span>Avg Loss:</span>
            <span class="metric-value negative">$${data.avg_loss.toFixed(2)}</span>
        </div>
    </div>
</div>

<div class="success">
    ✅ Backtest Complete
</div>
        `;
        
        resultsEl.innerHTML = html;
    } catch (err) {
        resultsEl.innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
    }
}

async function compareSymbols() {
    const symbols = document.getElementById("symbols-list").value;
    const days = parseInt(document.getElementById("compare-days").value);
    
    const resultsEl = document.getElementById("comparison-results");
    resultsEl.innerHTML = '<div class="loading">⏳ Comparing symbols...</div>';
    
    try {
        const res = await fetch(`${API_BASE}/backtest/compare?symbols=${encodeURIComponent(symbols)}&days=${days}`);
        const data = await res.json();
        
        if (data.error) {
            resultsEl.innerHTML = `<div class="error">❌ Error: ${data.error}</div>`;
            return;
        }
        
        // Create comparison table
        let html = `
<div style="margin-top: 30px;">
    <h3>📊 Symbol Comparison (${days} days)</h3>
    <table class="comparison-table">
        <tr>
            <th>Rank</th>
            <th>Symbol</th>
            <th>Trades</th>
            <th>Win Rate</th>
            <th>Net P&L</th>
            <th>ROI %</th>
            <th>Drawdown %</th>
            <th>Profit Factor</th>
        </tr>
        `;
        
        let rank = 1;
        for (const [symbol, result] of Object.entries(data.comparison)) {
            const rowClass = rank === 1 ? 'rank1' : 'rankN';
            html += `
        <tr>
            <td class="${rowClass}">#${rank}</td>
            <td class="${rowClass}">${symbol}</td>
            <td>${result.total_trades}</td>
            <td>${result.win_rate.toFixed(1)}%</td>
            <td class="${result.net_profit >= 0 ? 'rank1' : 'rankN'}">$${result.net_profit.toFixed(2)}</td>
            <td class="${result.roi_percent >= 0 ? 'rank1' : 'rankN'}">${result.roi_percent.toFixed(2)}%</td>
            <td class="rankN">${result.max_drawdown_percent.toFixed(2)}%</td>
            <td>${result.profit_factor.toFixed(2)}</td>
        </tr>
            `;
            rank++;
        }
        
        html += `
    </table>
    <div class="success" style="margin-top: 15px;">
        🏆 Best: <strong>${data.best_symbol}</strong> | Average ROI: <strong>${data.avg_roi.toFixed(2)}%</strong>
    </div>
</div>
        `;
        
        resultsEl.innerHTML = html;
    } catch (err) {
        resultsEl.innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
    }
}
</script>

</body>
</html>
