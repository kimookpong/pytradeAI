<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics Diagnostic</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #1e1e1e; color: #d4d4d4; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #444; }
        .section h3 { color: #4ec9b0; margin-top: 0; }
        pre { background: #252526; padding: 10px; overflow-x: auto; max-height: 300px; }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .warning { color: #dcdcaa; }
        button { padding: 8px 16px; margin: 5px; background: #0e639c; color: white; border: none; cursor: pointer; font-family: monospace; }
        button:hover { background: #1177bb; }
        .status { padding: 10px; margin: 10px 0; border-radius: 3px; }
        .status.ok { background: #1a3a1a; border-left: 3px solid #4ec9b0; }
        .status.err { background: #3a1a1a; border-left: 3px solid #f48771; }
    </style>
</head>
<body>

<h2>📋 Analytics Diagnostic Panel</h2>

<div class="section">
    <h3>Step 1: Verify Server Connection</h3>
    <button onclick="testConnection()">Test Server Connection</button>
    <div id="conn-status"></div>
</div>

<div class="section">
    <h3>Step 2: Load Test Trades (Import 50 trades)</h3>
    <button onclick="importTrades()">🚀 Import 50 Test Trades</button>
    <pre id="import-log"></pre>
</div>

<div class="section">
    <h3>Step 3: Test Analytics API</h3>
    <button onclick="testAnalyticsAPI()">📊 Test /api/analytics</button>
    <pre id="analytics-log"></pre>
</div>

<div class="section">
    <h3>Step 4: Direct Fetch Test (Raw Response)</h3>
    <button onclick="testRawFetch()">🔍 Raw Fetch Test</button>
    <pre id="raw-log"></pre>
</div>

<div class="section">
    <h3>Step 5: Clear & Reset</h3>
    <button onclick="clearLocalStorage()">🗑️ Clear localStorage</button>
    <button onclick="reloadPage()">🔄 Reload Page</button>
</div>

<script>
const API_BASE = "http://localhost:8888/api";

async function testConnection() {
    const el = document.getElementById("conn-status");
    try {
        const res = await fetch(`${API_BASE}/status`, { method: "GET" });
        const text = await res.text();
        el.innerHTML = `
            <div class="status ok">
                <span class="success">✅ Server Connected</span><br>
                Status: ${res.status} ${res.statusText}<br>
                Response: ${text.substring(0, 100)}
            </div>
        `;
    } catch (err) {
        el.innerHTML = `
            <div class="status err">
                <span class="error">❌ Connection Failed</span><br>
                ${err.message}
            </div>
        `;
    }
}

async function importTrades() {
    const el = document.getElementById("import-log");
    el.innerHTML = "🔄 Importing...";
    try {
        const res = await fetch(`${API_BASE}/analytics/import-test-trades`, { method: "POST" });
        const data = await res.json();
        
        if (data.success) {
            el.innerHTML = `<span class="success">✅ Import Successful</span>\n${JSON.stringify(data, null, 2)}`;
        } else {
            el.innerHTML = `<span class="error">❌ Import Failed</span>\n${JSON.stringify(data, null, 2)}`;
        }
    } catch (err) {
        el.innerHTML = `<span class="error">❌ Error</span>\n${err.message}`;
    }
}

async function testAnalyticsAPI() {
    const el = document.getElementById("analytics-log");
    el.innerHTML = "🔄 Loading...";
    try {
        const res = await fetch(`${API_BASE}/analytics?days=30`);
        const contentType = res.headers.get("content-type");
        const text = await res.text();
        
        console.log("Response Status:", res.status);
        console.log("Content-Type:", contentType);
        console.log("Raw Response:", text.substring(0, 200));
        
        // Try to parse JSON
        try {
            const data = JSON.parse(text);
            el.innerHTML = `<span class="success">✅ Valid JSON</span>\n${JSON.stringify(data, null, 2)}`;
        } catch (parseErr) {
            el.innerHTML = `<span class="error">❌ Invalid JSON Response</span>\nError: ${parseErr.message}\n\nRaw Response:\n${text}`;
        }
    } catch (err) {
        el.innerHTML = `<span class="error">❌ Fetch Error</span>\n${err.message}`;
    }
}

async function testRawFetch() {
    const el = document.getElementById("raw-log");
    el.innerHTML = "🔄 Fetching...";
    try {
        const res = await fetch(`${API_BASE}/analytics?days=30`);
        const text = await res.text();
        
        el.innerHTML = `
Status: ${res.status}
Content-Type: ${res.headers.get("content-type")}
First 500 chars:
${text.substring(0, 500)}
`;
    } catch (err) {
        el.innerHTML = `Error: ${err.message}`;
    }
}

function clearLocalStorage() {
    localStorage.clear();
    document.getElementById("import-log").innerHTML = "✅ localStorage cleared";
}

function reloadPage() {
    location.reload();
}

// Auto-test on load
window.addEventListener("load", () => {
    console.log("Diagnostic page loaded");
    console.log("API Base:", API_BASE);
});
</script>

</body>
</html>
